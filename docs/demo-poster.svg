<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Nightflight OJ demo video poster</title>
  <desc id="desc">A wide demo video poster with a play button for the Nightflight OJ README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050914"/>
      <stop offset=".55" stop-color="#10263a"/>
      <stop offset="1" stop-color="#07101c"/>
    </linearGradient>
    <radialGradient id="flare" cx="50%" cy="48%" r="50%">
      <stop offset="0" stop-color="#4de7ff" stop-opacity=".2"/>
      <stop offset=".55" stop-color="#4de7ff" stop-opacity=".06"/>
      <stop offset="1" stop-color="#4de7ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000814" flood-opacity=".6"/>
    </filter>
    <filter id="cyanGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .3 0 0 0 0 .9 0 0 0 0 1 0 0 0 .65 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="30" fill="url(#bg)"/>
  <rect width="1280" height="720" rx="30" fill="url(#flare)"/>

  <g opacity=".26" stroke="#2bd8ff" stroke-width="2">
    <path d="M80 -40 0 760"/>
    <path d="M240 -40 160 760"/>
    <path d="M400 -40 320 760"/>
    <path d="M560 -40 480 760"/>
    <path d="M720 -40 640 760"/>
    <path d="M880 -40 800 760"/>
    <path d="M1040 -40 960 760"/>
    <path d="M1200 -40 1120 760"/>
  </g>

  <g opacity=".9" stroke="#ffd166" stroke-width="9" stroke-linecap="round">
    <path d="M138 178h58"/>
    <path d="M210 252h58"/>
    <path d="M154 330h58"/>
    <path d="M1058 158h58"/>
    <path d="M1136 246h58"/>
    <path d="M1048 338h58"/>
    <path d="M1168 426h58"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="235" y="104" width="810" height="512" rx="28" fill="#071421" fill-opacity=".74" stroke="#35546f" stroke-width="2"/>
    <rect x="277" y="145" width="726" height="430" rx="22" fill="#050914" fill-opacity=".58" stroke="#4de7ff" stroke-opacity=".28"/>
  </g>

  <g text-anchor="middle" font-family="Inter, Segoe UI, Microsoft YaHei, Noto Sans SC, Arial, sans-serif">
    <text x="640" y="228" fill="#ffd166" font-size="28" font-weight="900" letter-spacing="3">DEMO VIDEO</text>
    <text x="640" y="310" fill="#eef5ff" font-size="58" font-weight="900">看一局夜航怎么起飞</text>
    <text x="640" y="362" fill="#7df5ff" font-size="28" font-weight="800">Dash · Verdict Mode · Boss · Leaderboard</text>
  </g>

  <g transform="translate(640 455)" filter="url(#cyanGlow)">
    <circle r="72" fill="#4de7ff" fill-opacity=".18" stroke="#7df5ff" stroke-width="4"/>
    <path d="M-20 -34 42 0 -20 34Z" fill="#eef5ff"/>
  </g>

  <g font-family="Inter, Segoe UI, Microsoft YaHei, Noto Sans SC, Arial, sans-serif" font-weight="900" text-anchor="middle">
    <rect x="452" y="542" width="376" height="50" rx="25" fill="#ffd166"/>
    <text x="640" y="575" fill="#07111b" font-size="22">点击播放 MP4 演示视频</text>
  </g>

  <rect x="1.5" y="1.5" width="1277" height="717" rx="28" fill="none" stroke="#27384c" stroke-width="3"/>
</svg>
