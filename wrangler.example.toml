name = "nightflight"
compatibility_date = "2026-05-05"
pages_build_output_dir = ".deploy-nightflight"

[[d1_databases]]
binding = "DB"
database_name = "nightflight_leaderboard"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomServer"
script_name = "nightflight-room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomServer"]

